<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maharab Hossen · Certificates Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#1e3a8a",
            accent: "#2563eb",
            base: "#f9fafb"
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .cert-card {
      break-inside: avoid;
      margin-bottom: 1.25rem;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .cert-card:hover {
      border-color: #2563eb;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.12);
    }
    .cert-img {
      width: 100%;
      display: block;
      object-fit: cover;
    }
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.92);
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .lightbox.active { display: flex; }
    .lightbox-img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      border-radius: 0.5rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }
    .masonry {
      column-count: 1;
      column-gap: 1.25rem;
    }
    @media (min-width: 640px) { .masonry { column-count: 2; } }
    @media (min-width: 1024px) { .masonry { column-count: 3; } }
    @media (min-width: 1280px) { .masonry { column-count: 4; } }
    .loader {
      width: 100%;
      height: 160px;
      background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .fade-in { opacity: 0; transition: opacity 0.4s ease; }
    .fade-in.loaded { opacity: 1; }
  </style>
<base target="_blank">
</head>
<body class="bg-base text-gray-900 antialiased">

  <!-- Header -->
  <header class="bg-white border-b sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="index.html" class="flex items-center gap-2 text-primary hover:text-accent transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          <span class="font-medium text-sm">Back to Portfolio</span>
        </a>
      </div>
      <h1 class="text-lg sm:text-xl font-bold text-primary">📜 Certificates Gallery</h1>
      <div class="text-sm text-gray-500" id="count">Loading...</div>
    </div>
  </header>

  <!-- Filter Tabs -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 pt-6">
    <div class="flex flex-wrap gap-2" id="filters">
      <button data-filter="all" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-primary text-white">All</button>
      <button data-filter="ai" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">AI & ML</button>
      <button data-filter="systems" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">Systems</button>
      <button data-filter="vision" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">Computer Vision</button>
      <button data-filter="cloud" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">Cloud & Distributed</button>
      <button data-filter="competition" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">Competitions</button>
      <button data-filter="other" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200">Other</button>
    </div>
  </div>

  <!-- Gallery -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
    <div class="masonry" id="gallery"></div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <button class="absolute top-4 right-4 text-white/80 hover:text-white p-2" onclick="event.stopPropagation(); closeLightbox()">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <button class="absolute left-4 top-1/2 -translate-y-1/2 text-white/80 hover:text-white p-2 hidden sm:block" onclick="event.stopPropagation(); prevImage()">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <button class="absolute right-4 top-1/2 -translate-y-1/2 text-white/80 hover:text-white p-2 hidden sm:block" onclick="event.stopPropagation(); nextImage()">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    </button>
    <img id="lightbox-img" class="lightbox-img" src="" alt="Certificate" onclick="event.stopPropagation()" />
    <p id="lightbox-caption" class="absolute bottom-6 left-1/2 -translate-x-1/2 text-white text-sm font-medium bg-black/50 px-4 py-1.5 rounded-full"></p>
  </div>

  <footer class="text-center text-sm text-gray-400 py-8">
    © 2025 Maharab Hossen · All certificates displayed are authentic
  </footer>

  <script>
    // ============================================================
    // Images fetched from: https://github.com/maharab549/Maharab131/tree/main/images
    // ============================================================
    const certificates = [
      { url: "https://raw.githubusercontent.com/maharab549/Maharab131/main/images/2024%20wushu%20compettion.jpg", title: "2024 Wushu Competition", category: "competition" },
      { url: "https://raw.githubusercontent.com/maharab549/Maharab131/main/images/2025%20wushu%20compettion.jpg", title: "2025 Wushu Competition", category: "competition" },
      { url: "https://raw.githubusercontent.com/maharab549/Maharab131/main/images/25%20wushu%20taichi%20competiiton.jpg", title: "25 Wushu Taichi Competition", category: "competition" },
      { url: "https://raw.githubusercontent.com/maharab549/Maharab131/main/images/27%20national%20level.png", title: "27th China Robot & AI Competition — National Level", category: "competition" },
      { url: "https://raw.githubusercontent.com/maharab549/Maharab131/main/images/27th%20province%20level.png", title: "27th China Robot & AI Competition — Provincial Level", category: "competition" },
      { url: "https://raw.githubusercontent.com/maharab549/Maharab131/main/images/Bd%20clean.jpg", title: "BD Clean Initiative", category: "other" },
      { url: "https://raw.githubusercontent.com/maharab549/Maharab131/main/images/Red%20cross%20license.jpg", title: "Red Cross License", category: "other" },
      { url: "https://raw.githubusercontent.com/maharab549/Maharab131/main/images/campus%20sport%20program%20third%20prize.jpg", title: "Campus Sport Program — Third Prize", category: "competition" },
      { url: "https://raw.githubusercontent.com/maharab549/Maharab131/main/images/dormitory%20cultural%20compettion.jpg", title: "Dormitory Cultural Competition", category: "other" },
    ];
    // ============================================================

    let currentIndex = 0;
    let filteredCerts = [...certificates];

    function renderGallery(filter = "all") {
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";
      filteredCerts = filter === "all" ? certificates : certificates.filter(c => c.category === filter);
      document.getElementById("count").textContent = filteredCerts.length + " certificates";

      filteredCerts.forEach((cert, idx) => {
        const card = document.createElement("div");
        card.className = "cert-card";
        card.onclick = () => openLightbox(idx);

        const loader = document.createElement("div");
        loader.className = "loader";
        loader.id = "loader-" + idx;

        const img = document.createElement("img");
        img.className = "cert-img fade-in";
        img.dataset.src = cert.url;
        img.alt = cert.title;
        img.loading = "lazy";
        img.onerror = () => {
          loader.style.display = "none";
          img.style.display = "none";
          const fallback = document.createElement("div");
          fallback.className = "p-6 text-center text-gray-400";
          fallback.innerHTML = `<svg class="w-10 h-10 mx-auto mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg><p class="text-sm">${cert.title}</p><p class="text-xs mt-1">Image not available</p>`;
          card.appendChild(fallback);
        };
        img.onload = () => {
          loader.style.display = "none";
          img.classList.add("loaded");
        };

        const caption = document.createElement("div");
        caption.className = "px-3 py-2.5";
        caption.innerHTML = `<p class="text-sm font-medium text-gray-800 truncate">${cert.title}</p>`;

        card.appendChild(loader);
        card.appendChild(img);
        card.appendChild(caption);
        gallery.appendChild(card);
      });

      // Lazy load with IntersectionObserver
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            img.src = img.dataset.src;
            obs.unobserve(img);
          }
        });
      }, { rootMargin: "100px" });
      document.querySelectorAll("img[data-src]").forEach(img => obs.observe(img));
    }

    function openLightbox(idx) {
      currentIndex = idx;
      updateLightbox();
      document.getElementById("lightbox").classList.add("active");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("active");
      document.body.style.overflow = "";
    }

    function updateLightbox() {
      const cert = filteredCerts[currentIndex];
      document.getElementById("lightbox-img").src = cert.url;
      document.getElementById("lightbox-caption").textContent = cert.title + " (" + (currentIndex + 1) + "/" + filteredCerts.length + ")";
    }

    function nextImage() {
      currentIndex = (currentIndex + 1) % filteredCerts.length;
      updateLightbox();
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + filteredCerts.length) % filteredCerts.length;
      updateLightbox();
    }

    // Keyboard navigation
    document.addEventListener("keydown", (e) => {
      const lb = document.getElementById("lightbox");
      if (!lb.classList.contains("active")) return;
      if (e.key === "Escape") closeLightbox();
      if (e.key === "ArrowRight") nextImage();
      if (e.key === "ArrowLeft") prevImage();
    });

    // Filter buttons
    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => {
          b.classList.remove("bg-primary", "text-white");
          b.classList.add("bg-gray-100", "text-gray-600");
        });
        btn.classList.remove("bg-gray-100", "text-gray-600");
        btn.classList.add("bg-primary", "text-white");
        renderGallery(btn.dataset.filter);
      });
    });

    // Init
    renderGallery();
  </script>
</body>
</html>
